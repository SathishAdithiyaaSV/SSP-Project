---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: hotelres-search-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      containers:
      - name: consul
        image: hashicorp/consul:latest
        args:
        - agent
        - -dev
        - -client
        - 0.0.0.0
        ports:
        - containerPort: 8500
---
apiVersion: v1
kind: Service
metadata:
  name: consul
  namespace: hotelres-search-sandbox
spec:
  selector:
    app: consul
  ports:
  - port: 8500
    targetPort: 8500
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: hotelres-search-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        ports:
        - containerPort: 16686
        - containerPort: 6831
          protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: hotelres-search-sandbox
spec:
  selector:
    app: jaeger
  ports:
  - port: 6831
    targetPort: 6831
    protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo
  namespace: hotelres-search-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: geo
  template:
    metadata:
      labels:
        app: geo
    spec:
      containers:
      - name: geo-dummy
        image: deathstarbench/hotel-reservation-sandbox-dummy:mvp
        imagePullPolicy: IfNotPresent
        command:
        - python
        - -m
        - hotelReservation.sandboxing.dummy_server
        args:
        - --repo-root
        - /workspace
        - --service
        - geo
        - --fixture-path
        - /fixtures/geo.json
        - --port
        - '8083'
        - --consul-addr
        - consul:8500
        - --consul-name
        - srv-geo
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 8083
        volumeMounts:
        - name: fixtures
          mountPath: /fixtures
          readOnly: true
      volumes:
      - name: fixtures
        configMap:
          name: geo-fixtures
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate
  namespace: hotelres-search-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rate
  template:
    metadata:
      labels:
        app: rate
    spec:
      containers:
      - name: rate-dummy
        image: deathstarbench/hotel-reservation-sandbox-dummy:mvp
        imagePullPolicy: IfNotPresent
        command:
        - python
        - -m
        - hotelReservation.sandboxing.dummy_server
        args:
        - --repo-root
        - /workspace
        - --service
        - rate
        - --fixture-path
        - /fixtures/rate.json
        - --port
        - '8084'
        - --consul-addr
        - consul:8500
        - --consul-name
        - srv-rate
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 8084
        volumeMounts:
        - name: fixtures
          mountPath: /fixtures
          readOnly: true
      volumes:
      - name: fixtures
        configMap:
          name: rate-fixtures
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: hotelres-search-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
    spec:
      containers:
      - name: search
        image: deathstarbench/hotel-reservation:mvp
        imagePullPolicy: IfNotPresent
        command:
        - /go/bin/search
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 256Mi
        ports:
        - containerPort: 8082
